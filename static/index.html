<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeterVision Enterprise</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Blinker:wght@300;400;600;700&family=Shippori+Antique+B1&display=swap"
        rel="stylesheet">
    <!-- Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="/static/style.css">
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/static/favicon.png">
</head>

<body>
    <div id="app">
        <!-- Content will be rendered here by app.js -->
    </div>

    <!-- App Layout Template -->
    <template id="app-layout-template">
        <div id="sidebar">
            <div id="logo">
                <img src="/static/logo.svg" alt="Smartrplace logo" class="sidebar-logo">
            </div>
            <nav id="main-nav">
                <ul>
                    <li>
                        <a href="#" data-view="dashboard" title="View current status and statistics">
                            <i class="ph-fill ph-squares-four"></i>
                            <span class="nav-text">
                                <span class="nav-title" data-i18n="menu.dashboard.title">Übersicht</span>
                                <span class="nav-subtitle" data-i18n="menu.dashboard.desc">Aktuellen Status und
                                    Statistiken anzeigen</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-view="organizations" title="Manage tenants and customers">
                            <i class="ph-fill ph-buildings"></i>
                            <span class="nav-text">
                                <span class="nav-title" data-i18n="menu.organizations.title">Kunden /
                                    Organisationen</span>
                                <span class="nav-subtitle" data-i18n="menu.organizations.desc">Mandanten und Kunden
                                    verwalten</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-view="meters" title="View and manage meters">
                            <i class="ph-fill ph-gauge"></i>
                            <span class="nav-text">
                                <span class="nav-title" data-i18n="menu.meters.title">Zählerverwaltung</span>
                                <span class="nav-subtitle" data-i18n="menu.meters.desc">Zähler und Ablesungen
                                    verwalten</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-view="logs" title="System event history">
                            <i class="ph-fill ph-scroll"></i>
                            <span class="nav-text">
                                <span class="nav-title" data-i18n="menu.logs.title">Systemprotokolle</span>
                                <span class="nav-subtitle" data-i18n="menu.logs.desc">Verlauf der Systemereignisse
                                    ansehen</span>
                            </span>
                        </a>
                    </li>
                    <li>
                        <a href="#" data-view="settings" title="App configuration">
                            <i class="ph-fill ph-gear"></i>
                            <span class="nav-text">
                                <span class="nav-title" data-i18n="menu.settings.title">Einstellungen</span>
                                <span class="nav-subtitle" data-i18n="menu.settings.desc">App-Konfiguration</span>
                            </span>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>

        <main id="main-content">
            <!-- Mobile Overlay -->
            <div id="sidebar-overlay" class="modal-overlay"></div>

            <header id="main-header">
                <div style="display: flex; align-items: center; gap: 1rem;">
                    <button id="mobile-menu-btn" class="mobile-nav-toggle">
                        <i class="ph-bold ph-list"></i>
                    </button>
                    <span id="app-header-title">MeterVision</span>
                </div>

                <div style="display: flex; align-items: center; gap: 1rem;">
                    <div id="user-info">
                        <!-- User info loaded here -->
                    </div>
                    <button id="lang-toggle-btn" class="btn btn-secondary"
                        style="padding: 0.4rem 0.8rem; font-size: 0.875rem;">
                        <i class="ph-bold ph-translate"></i> <span id="current-lang-text">EN</span>
                    </button>
                    <button id="logout-btn" class="btn btn-secondary"
                        style="padding: 0.4rem 1rem; font-size: 0.875rem;">
                        <i class="ph-bold ph-sign-out"></i> <span data-i18n="header.logout">Abmelden</span>
                    </button>
                </div>
            </header>

            <div id="view-content">
                <!-- Views will be rendered here -->
            </div>
        </main>

        <!-- Global Modal Container -->
        <div id="global-modal" class="modal-overlay">
            <div class="modal">
                <div class="modal-header">
                    <h3 id="modal-title">Modal Title</h3>
                    <button class="close-modal"><i class="ph-bold ph-x"></i></button>
                </div>
                <div id="modal-body"></div>
            </div>
        </div>
    </template>

    <!-- Login Template -->
    <template id="login-template">
        <div id="login-view" class="card">
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <img src="/static/logo.svg" alt="Smartrplace logo" class="brand-logo"
                    style="margin: 0 auto 1.5rem auto;">
                <h1 data-i18n="login.title"
                    style="font-family: 'Shippori Antique B1', serif; font-size: 2.125rem; font-weight: 700; color: var(--primary-color); margin: 0 0 0.5rem 0;">
                    MeterVision</h1>
                <p data-i18n="login.subtitle" style="color: var(--primary-color); font-size: 1.25rem; margin: 0;">
                    Anmelden</p>
            </div>

            <form id="login-form">
                <div class="form-group">
                    <label class="form-label" data-i18n="login.username"
                        style="color: var(--primary-color);">Benutzername*</label>
                    <input type="text" id="username" placeholder="" required
                        style="border-color: var(--primary-color); padding: 0.875rem; border-radius: var(--radius-sm);">
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="login.password"
                        style="color: var(--primary-color); margin-top: 1.5rem;">Passwort*</label>
                    <input type="password" id="password" placeholder="" required
                        style="border-color: var(--primary-color); padding: 0.875rem; border-radius: var(--radius-sm);">
                </div>
                <button type="submit" class="btn btn-primary"
                    style="width: 100%; margin-top: 2rem; padding: 1rem; border-radius: 50px;"
                    data-i18n="login.button">Einloggen</button>
            </form>
        </div>
    </template>

    <!-- Dashboard Template -->
    <template id="dashboard-template">
        <div class="dashboard-grid">
            <div class="card stat-card">
                <div class="stat-icon bg-green-light"><i class="ph-fill ph-gauge"></i></div>
                <div class="stat-value" id="stat-active-meters">-</div>
                <div class="stat-label" data-i18n="dashboard.active_meters">Aktive Zähler</div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon bg-blue-light"><i class="ph-fill ph-buildings"></i></div>
                <div class="stat-value" id="stat-organizations">-</div>
                <div class="stat-label" data-i18n="dashboard.organizations">Organisationen</div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon bg-orange-light"><i class="ph-fill ph-lightning"></i></div>
                <div class="stat-value" id="stat-readings-today">-</div>
                <div class="stat-label" data-i18n="dashboard.readings_today">Ablesungen Heute</div>
            </div>
            <div class="card stat-card">
                <div class="stat-icon bg-red-light"><i class="ph-fill ph-warning-circle"></i></div>
                <div class="stat-value" id="stat-alerts">0</div>
                <div class="stat-label" data-i18n="dashboard.alerts">Warnungen</div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <h3 class="card-title" data-i18n="dashboard.recent_activity">Letzte Aktivitäten</h3>
                <button class="btn btn-sm btn-secondary" data-i18n="dashboard.view_all">Alle ansehen</button>
            </div>
            <div class="table-container">
                <table id="recent-activity-table">
                    <thead>
                        <tr>
                            <th data-i18n="dashboard.table.time">Zeit</th>
                            <th data-i18n="dashboard.table.event">Ereignis</th>
                            <th data-i18n="dashboard.table.details">Details</th>
                            <th data-i18n="dashboard.table.status">Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td colspan="4" class="text-muted" style="text-align: center;"
                                data-i18n="dashboard.table.loading">Aktivitäten werden geladen...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </template>

    <!-- Organizations Template -->
    <template id="organizations-template">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title" data-i18n="organizations.title">Meine Organisationen</h3>
                <!-- Admin only button could go here -->
            </div>
            <ul id="org-list"></ul>
        </div>
    </template>

    <!-- Meters Template -->
    <template id="meters-template">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
            <div style="display: flex; gap: 1rem; flex: 1; max-width: 400px;">
                <input type="text" placeholder="Suchen..." data-i18n-placeholder="meters.search" id="meter-search">
            </div>
            <button class="btn btn-primary" id="btn-create-meter">
                <i class="ph-bold ph-plus"></i> <span data-i18n="meters.add_meter">Zähler hinzufügen</span>
            </button>
        </div>

        <div id="meters-grid" class="meter-grid">
            <!-- Meters will be populated here -->
        </div>
    </template>

    <!-- Meter Detail Template (New) -->
    <template id="meter-detail-template">
        <div style="margin-bottom: 1.5rem;">
            <button class="btn btn-secondary" onclick="navigateTo('meters')">
                <i class="ph-bold ph-arrow-left"></i> <span data-i18n="meter_detail.back">Zurück zu Zählern</span>
            </button>
        </div>

        <div class="dashboard-grid" style="grid-template-columns: 2fr 1fr;">
            <!-- Left Column: Chart & Validations -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="card">
                    <div class="card-header">
                        <h3 class="card-title" data-i18n="meter_detail.history">Ablesehistorie</h3>
                        <div style="display: flex; gap: 0.5rem;">
                            <button class="btn btn-sm btn-secondary active">7T</button>
                            <button class="btn btn-sm btn-secondary">30T</button>
                        </div>
                    </div>
                    <div class="chart-container">
                        <canvas id="meter-history-chart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title" style="margin-bottom: 1rem;" data-i18n="meter_detail.recent">Letzte
                        Ablesungen</h3>
                    <div class="table-container">
                        <table id="readings-table">
                            <thead>
                                <tr>
                                    <th data-i18n="meter_detail.table.date">Datum</th>
                                    <th data-i18n="meter_detail.table.value">Wert</th>
                                    <th data-i18n="meter_detail.table.image">Bild</th>
                                </tr>
                            </thead>
                            <tbody></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Right Column: Info & Actions -->
            <div style="display: flex; flex-direction: column; gap: 1.5rem;">
                <div class="card">
                    <h3 class="card-title" style="margin-bottom: 1rem;" data-i18n="meter_detail.details">Zählerdetails
                    </h3>
                    <div id="meter-meta-info">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div class="card">
                    <h3 class="card-title" style="margin-bottom: 1rem;" data-i18n="meter_detail.manual_upload">Manueller
                        Upload</h3>
                    <form id="upload-reading-form">
                        <div class="form-group">
                            <label class="form-label" data-i18n="meter_detail.upload_image">Bild hochladen</label>
                            <input type="file" id="reading-image" accept="image/*" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" data-i18n="meter_detail.expected_value">Erwarteter Wert
                                (Optional)</label>
                            <input type="number" step="any" id="expected-value" placeholder="z.B. 1234.5">
                        </div>
                        <button type="submit" class="btn btn-primary" style="width: 100%;" id="btn-upload-reading">
                            <i class="ph-bold ph-upload-simple"></i> <span
                                data-i18n="meter_detail.submit">Einreichen</span>
                        </button>
                    </form>
                </div>

                <div class="card"
                    style="border: 1px solid rgba(239, 68, 68, 0.4); background-color: rgba(239, 68, 68, 0.08);">
                    <h3 class="card-title" style="margin-bottom: 1rem; color: var(--error);"
                        data-i18n="meter_detail.danger_zone">Gefahrenbereich</h3>
                    <button id="delete-meter-btn" class="btn"
                        style="width: 100%; background-color: var(--error); color: white; border: none;">
                        <i class="ph-bold ph-trash"></i> <span data-i18n="meter_detail.delete_meter">Zähler
                            löschen</span>
                    </button>
                </div>
            </div>
        </div>
    </template>

    <!-- Logs Template -->
    <template id="log-viewer-template">
        <div class="card">
            <div class="card-header">
                <h3 class="card-title" data-i18n="logs.title">Systemprotokolle</h3>
                <button class="btn btn-secondary btn-sm" id="refresh-logs"><i class="ph-bold ph-arrows-clockwise"></i>
                    <span data-i18n="logs.refresh">Aktualisieren</span></button>
            </div>
            <div id="log-entries"></div>
        </div>
    </template>

    <!-- Settings Template -->
    <template id="settings-template">
        <div class="card">
            <h3 class="card-title" style="margin-bottom: 1.5rem;" data-i18n="settings.title">App-Einstellungen</h3>
            <p class="text-muted" data-i18n="settings.desc">Konfigurationsoptionen werden hier angezeigt.</p>
        </div>
    </template>

    <!-- Create Meter Modal Content -->
    <template id="create-meter-modal-content">
        <form id="create-meter-form">
            <div class="form-group">
                <label class="form-label" data-i18n="modal.create_meter.serial">Seriennummer</label>
                <input type="text" name="serial_number" required>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="modal.create_meter.org_id">Organisations-ID (Optional)</label>
                <input type="number" name="organization_id" placeholder="Leer lassen für Standard"
                    data-i18n-placeholder="modal.create_meter.org_id_placeholder">
                <small class="text-muted" data-i18n="modal.create_meter.org_id_help">Leer lassen, um die "Undefinierte
                    Organisation" zu verwenden</small>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="modal.create_meter.type">Typ</label>
                <input type="text" name="meter_type" list="meter-types" required
                    placeholder="Wählen oder tippen Sie einen benutzerdefinierten Typ"
                    data-i18n-placeholder="modal.create_meter.type_placeholder">
                <datalist id="meter-types">
                    <option value="Electricity">
                    <option value="Gas">
                    <option value="Water">
                    <option value="Heat">
                    <option value="CO2">
                    <option value="Pressure">
                    <option value="Temperature">
                </datalist>
            </div>
            <div class="form-group">
                <label class="form-label" data-i18n="modal.create_meter.unit">Einheit</label>
                <select name="unit">
                    <option value="kWh">kWh</option>
                    <option value="m3">m³</option>
                    <option value="L">L</option>
                </select>
            </div>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1.5rem;">
                <button type="button" class="btn btn-secondary modal-close-btn"
                    data-i18n="modal.cancel">Abbrechen</button>
                <button type="submit" class="btn btn-primary" data-i18n="modal.create_meter.submit">Zähler
                    erstellen</button>
            </div>
        </form>
    </template>

    <script type="module" src="/static/app.js"></script>
</body>

</html>
